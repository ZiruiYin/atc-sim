<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATC Radar</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #191919;
    color: #ddd;
    font-family: monospace, sans-serif;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }
  #main {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  #radarArea {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }
  #leftPanel {
    width: 320px;
    flex-shrink: 0;
    background: #1a1a1a;
    border-right: 2px solid #444;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #scriptSection {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  #scriptSection h4 {
    padding: 10px 12px 0 12px;
    margin: 0 0 4px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-weight: normal;
  }
  #scriptList {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px 12px 12px;
  }
  .script-msg {
    padding: 6px 8px;
    margin-bottom: 4px;
    border-radius: 3px;
    font: 12px monospace;
    line-height: 1.4;
    word-wrap: break-word;
    border-left: 3px solid #888;
  }
  .script-msg.atc {
    background: rgba(40, 90, 160, 0.22);
    color: #cfe6ff;
    border-left-color: #4a90e2;
  }
  .script-msg.pilot {
    background: rgba(40, 130, 60, 0.18);
    color: #d2f0d8;
    border-left-color: #5bbf6e;
  }
  .script-msg.invalid {
    background: rgba(180, 60, 60, 0.22);
    color: #ffd2d2;
    border-left-color: #d04848;
  }
  .script-msg.unable {
    background: rgba(200, 130, 40, 0.20);
    color: #ffe0b8;
    border-left-color: #e0a040;
  }
  #scriptList:empty::before {
    content: "(no transmissions)";
    color: #555;
    font-size: 12px;
    font-style: italic;
  }
  #radarWrap {
    position: relative;
    line-height: 0;
  }
  canvas {
    background: #191919;
    display: block;
    width: 100%;
    height: 100%;
  }
  #ffIndicator {
    position: absolute;
    top: 8px;
    left: 12px;
    color: #ffeb3b;
    font-size: 16px;
    font-weight: bold;
    pointer-events: none;
  }
  #pausedIndicator {
    position: absolute;
    top: 8px;
    left: 12px;
    color: #29b6f6;
    font-size: 16px;
    font-weight: bold;
    pointer-events: none;
    display: none;
  }
  #crashOverlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 0, 0, 0.45);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    color: #fff;
    pointer-events: none;   /* let clicks fall through except on the buttons */
  }
  #crashMsg {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    padding: 0 16px;
  }
  #crashBtns {
    display: flex;
    gap: 14px;
    pointer-events: auto;   /* re-enable clicks on the buttons themselves */
  }
  #crashBtns button {
    padding: 10px 22px;
    font: bold 15px monospace;
    letter-spacing: 1px;
    cursor: pointer;
  }
  #crashRestartBtn { background: #1d4a2a; color: #d6f0db; border: 1px solid #2f7a43; }
  #crashRestartBtn:hover { background: #266237; }
  #crashExitBtn { background: #3a2a14; color: #ffd9a8; border: 1px solid #7a5a2a; }
  #crashExitBtn:hover { background: #5a3f1c; }
  #bootOverlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #eee;
    pointer-events: none;
    z-index: 10;
  }
  #sidePanel {
    width: 320px;
    flex-shrink: 0;
    background: #1a1a1a;
    border-left: 2px solid #444;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-section {
    padding: 10px 12px;
    border-bottom: 1px solid #2e2e2e;
  }
  .panel-section h4 {
    margin: 0 0 6px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-weight: normal;
  }
  .stat-row {
    font-size: 13px;
    color: #c8c8c8;
    line-height: 1.5;
  }
  .stat-row .label { color: #888; }
  .toggle-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .toggle-btn {
    background: #2a2a2a;
    color: #777;
    border: 1px solid #444;
    padding: 4px 8px;
    cursor: pointer;
    font: 12px monospace;
    min-width: 36px;
    text-align: center;
  }
  .toggle-btn:hover { background: #333; }
  .toggle-btn.active {
    background: #2e6f3f;
    border-color: #4caf50;
    color: #e8f5e8;
  }
  .dir-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    width: 130px;
  }
  .dir-grid .toggle-btn { min-width: 0; }
  .dir-grid .empty { visibility: hidden; }
  .rate-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .rate-row .toggle-btn { min-width: 28px; }
  #stripsSection {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  #stripsSection h4 {
    padding: 10px 12px 0 12px;
    margin: 0 0 4px 0;
  }
  #strips {
    flex: 1;
    overflow-y: auto;
    padding: 6px 12px 12px 12px;
  }
  .strip {
    background: #232323;
    border: 1px solid #3a3a3a;
    border-left: 4px solid #888;
    padding: 6px 8px;
    margin-bottom: 6px;
    cursor: pointer;
    font: 12px monospace;
    color: #ddd;
  }
  .strip:hover { background: #2a2a2a; }
  .strip .cs {
    font-weight: bold;
    font-size: 14px;
    color: #fff;
    margin-bottom: 2px;
  }
  .strip .info { color: #bbb; line-height: 1.4; }
  .strip.warn {
    border-left-color: #ff5252;
    color: #ff8a80;
  }
  .strip.warn .cs { color: #ff5252; }
  .strip.warn .info { color: #ff8a80; }
  #strips:empty::before {
    content: "(no aircraft)";
    color: #555;
    font-size: 12px;
    font-style: italic;
  }
  #controls {
    width: 100%;
    box-sizing: border-box;
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    background: #1f1f1f;
    border-top: 2px solid #555;
  }
  #cmd {
    flex: 1;
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #555;
    padding: 6px 8px;
    font: 16px monospace;
    outline: none;
  }
  #cmd:focus { border-color: #4caf50; }
  button {
    background: #333;
    color: #ddd;
    border: 1px solid #555;
    padding: 6px 10px;
    cursor: pointer;
    font: 13px monospace;
  }
  button:hover { background: #444; }
  button.active { background: #ffeb3b; color: #000; }
  #pauseBtn.active { background: #29b6f6; color: #000; }
  #restartBtn {
    background: #7a1f1f;
    color: #ffdede;
    border-color: #b33;
    font-weight: bold;
  }
  #restartBtn:hover { background: #a02828; }
  #airportSection select {
    width: 100%;
    box-sizing: border-box;
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #555;
    padding: 6px 8px;
    font: 13px monospace;
    cursor: pointer;
    outline: none;
  }
  #airportSection select:focus { border-color: #4caf50; }
  #autoBtn {
    position: absolute;
    top: 8px;
    right: 12px;
    background: #14406e;
    color: #d6ecff;
    border: 1px solid #2f6fb3;
    padding: 6px 14px;
    font: bold 14px monospace;
    cursor: pointer;
    letter-spacing: 1px;
    z-index: 5;
    display: none;
  }
  #autoBtn:hover { background: #1b5394; }
  #autoBtn.active {
    background: #2f6fb3;
    color: #fff;
    box-shadow: 0 0 8px rgba(47, 111, 179, 0.8);
  }
  #autoBtn:disabled { opacity: 0.6; cursor: default; }
  #planningIndicator {
    position: absolute;
    top: 8px;
    left: 12px;
    color: #ffb84d;
    font-size: 16px;
    font-weight: bold;
    pointer-events: none;
    display: none;
  }

  /* ---- Landing page (accounts + leaderboard) ---------------------------- */
  #landing {
    height: 100vh;
    width: 100vw;
    overflow-y: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background:
      radial-gradient(circle at 50% 0%, #14241a 0%, #101410 60%, #0c0c0c 100%);
  }
  #landingInner {
    width: 420px;
    max-width: 92vw;
    padding: 48px 0 60px 0;
  }
  #landingTitle {
    text-align: center;
    font-size: 30px;
    letter-spacing: 6px;
    font-weight: bold;
    color: #5bbf6e;
    margin: 0 0 4px 0;
    text-shadow: 0 0 12px rgba(91, 191, 110, 0.45);
  }
  #landingTag {
    text-align: center;
    color: #6a8a72;
    font-size: 12px;
    letter-spacing: 2px;
    margin: 0 0 28px 0;
  }
  .landing-card {
    background: #161a16;
    border: 1px solid #2c3a2e;
    border-radius: 6px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .landing-card h2 {
    margin: 0 0 12px 0;
    font-size: 13px;
    letter-spacing: 2px;
    color: #8fae96;
    font-weight: normal;
    text-transform: uppercase;
  }
  #authBox input {
    width: 100%;
    box-sizing: border-box;
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #555;
    padding: 9px 10px;
    font: 14px monospace;
    outline: none;
    margin-bottom: 10px;
  }
  #authBox input:focus { border-color: #4caf50; }
  #authButtons { display: flex; gap: 10px; }
  #authButtons button { flex: 1; padding: 9px 8px; font: 13px monospace; }
  #loginBtn {
    background: #1d4a2a; color: #d6f0db; border-color: #2f7a43; font-weight: bold;
  }
  #loginBtn:hover { background: #266237; }
  #guestBtn { background: #333; color: #ddd; }
  #authMsg {
    min-height: 16px; font-size: 12px; margin-bottom: 8px; line-height: 1.4;
  }
  #authMsg.err { color: #ff8a80; }
  #authMsg.ok  { color: #9ce0a8; }
  #authUserRow {
    font-size: 12px; color: #9cc7a6; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  #authUserRow button { padding: 3px 8px; font-size: 11px; }
  #boardHead {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  #boardHead h2 { margin: 0; }
  #boardAirport {
    background: #2a2a2a; color: #fff; border: 1px solid #555;
    padding: 4px 8px; font: 12px monospace; cursor: pointer; outline: none;
  }
  #boardAirport:focus { border-color: #4caf50; }
  #boardTable { width: 100%; border-collapse: collapse; font: 12px monospace; }
  #boardTable th {
    text-align: right; color: #6a8a72; font-weight: normal; padding: 4px 6px;
    border-bottom: 1px solid #2c3a2e;
  }
  #boardTable th:nth-child(2) { text-align: left; }
  #boardTable td {
    text-align: right; padding: 5px 6px; color: #cfe0d3;
    border-bottom: 1px solid #1d231e;
  }
  #boardTable td:nth-child(2) { text-align: left; color: #fff; }
  #boardTable tr.me td { color: #ffe082; }
  #boardTable tr.me td:nth-child(2) { color: #ffe082; }
  #boardBody:empty { display: none; }
  #boardNote { color: #6a8a72; font-size: 12px; font-style: italic; padding: 8px 2px 0; }

  /* ---- EXIT button (sim page, top-left of the airport selector) --------- */
  #airportTop { display: flex; gap: 8px; align-items: stretch; }
  #airportTop select { flex: 1; width: auto; min-width: 0; }
  #exitBtn {
    flex-shrink: 0;
    background: #3a2a14; color: #ffd9a8; border: 1px solid #7a5a2a;
    font-weight: bold; letter-spacing: 1px; padding: 6px 12px;
  }
  #exitBtn:hover { background: #5a3f1c; }

  /* ---- "Save this run?" modal ------------------------------------------ */
  #saveModal {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0, 0, 0, 0.72);
    display: none; align-items: center; justify-content: center;
  }
  #saveDialog {
    background: #161a16; border: 1px solid #2f7a43; border-radius: 6px;
    padding: 22px 24px; width: 320px; max-width: 90vw; text-align: center;
  }
  #saveDialog h3 {
    margin: 0 0 12px 0; color: #8fae96; font-size: 15px; letter-spacing: 1px;
  }
  #saveStats {
    font: 12px monospace; color: #cfe0d3; margin-bottom: 16px; line-height: 1.7;
  }
  #saveStats b { color: #fff; }
  #saveBtns { display: flex; gap: 10px; }
  #saveBtns button { flex: 1; padding: 9px; }
  #saveYes { background: #1d4a2a; color: #d6f0db; border-color: #2f7a43; font-weight: bold; }
  #saveYes:hover { background: #266237; }
  #saveYes:disabled { opacity: 0.6; cursor: default; }

  /* ---- Generic styled confirm/info modal (AUTO prompt, etc.) ----------- */
  #msgModal {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(0, 0, 0, 0.72);
    display: none; align-items: center; justify-content: center;
  }
  #msgDialog {
    background: #161a16; border: 1px solid #2f7a43; border-radius: 6px;
    padding: 22px 24px; width: 360px; max-width: 90vw; text-align: center;
  }
  #msgDialog h3 {
    margin: 0 0 12px 0; color: #8fae96; font-size: 15px; letter-spacing: 1px;
  }
  #msgBody { font: 13px monospace; color: #cfe0d3; margin-bottom: 18px; line-height: 1.6; }
  #msgBtns { display: flex; gap: 10px; }
  #msgBtns button { flex: 1; padding: 9px; }
  #msgOk { background: #1d4a2a; color: #d6f0db; border-color: #2f7a43; font-weight: bold; }
  #msgOk:hover { background: #266237; }
</style>
<!-- Accounts + leaderboard (Supabase). Pure browser<->Supabase, so this works
     on BOTH the GitHub Pages (Pyodide) build and the Hugging Face (Flask) one.
     No-ops gracefully to guest-only play until web/config.js is filled in. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="web/config.js"></script>
<script src="web/supabaseClient.js"></script>
<script src="web/api.js"></script>
</head>
<body>

<!-- ============================ PAGE 1: LANDING ========================== -->
<div id="landing">
  <div id="landingInner">
    <h1 id="landingTitle">TRACON SIMULATOR</h1>
    <div id="landingTag">AN ATC SIMULATOR</div>

    <div class="landing-card" id="authBox">
      <div id="authUserRow" style="display:none;">
        Signed in as <b id="authWho"></b>
        <button id="logoutBtn">Log out</button>
      </div>
      <input id="authUser" placeholder="User Name" autocomplete="username" maxlength="20" />
      <input id="authPass" type="password" placeholder="Password" autocomplete="current-password" maxlength="72" />
      <div id="authMsg"></div>
      <div id="authButtons">
        <button id="loginBtn">Log in / Sign Up</button>
        <button id="guestBtn">Continue as a Guest</button>
      </div>
    </div>

    <div class="landing-card" id="boardBox">
      <div id="boardHead">
        <h2>Leaderboard</h2>
        <select id="boardAirport"></select>
      </div>
      <table id="boardTable">
        <thead><tr>
          <th>#</th><th>Player</th><th>Landed</th><th>Viol&nbsp;s</th><th>Exits</th><th>Time</th>
        </tr></thead>
        <tbody id="boardBody"></tbody>
      </table>
      <div id="boardNote"></div>
    </div>
  </div>
</div>

<!-- "Save this run?" confirmation (logged-in players only) -->
<div id="saveModal">
  <div id="saveDialog">
    <h3>Save this run?</h3>
    <div id="saveStats"></div>
    <div id="saveBtns">
      <button id="saveYes">Yes, save</button>
      <button id="saveNo">No</button>
    </div>
  </div>
</div>

<!-- Generic confirm/info modal (AUTO prompt, etc.) -->
<div id="msgModal">
  <div id="msgDialog">
    <h3 id="msgTitle"></h3>
    <div id="msgBody"></div>
    <div id="msgBtns">
      <button id="msgOk">OK</button>
      <button id="msgCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ============================ PAGE 2: SIMULATOR ======================== -->
<div id="app" style="display:none;">
  <div id="main">
    <div id="leftPanel">
      <div id="airportSection" class="panel-section">
        <h4>Airport</h4>
        <div id="airportTop">
          <button id="exitBtn" title="Leave to the title screen (offers to save your run)">EXIT</button>
          <select id="airportSelect">
            <option value="test" selected>SIMULATED</option>
            <option value="egll">EGLL</option>
          </select>
        </div>
      </div>
      <div id="scriptSection" class="panel-section">
        <h4>Script</h4>
        <div id="scriptList"></div>
      </div>
    </div>
    <div id="radarArea">
      <div id="radarWrap">
        <canvas id="radar" width="800" height="800"></canvas>
        <button id="autoBtn" title="Autonomous multi-aircraft planner (SIMULATED only)">AUTO</button>
        <div id="planningIndicator">PLANNING…</div>
        <div id="ffIndicator"></div>
        <div id="pausedIndicator">PAUSED</div>
        <div id="crashOverlay">
          <div id="crashMsg"></div>
          <div id="crashBtns">
            <button id="crashRestartBtn">Restart</button>
            <button id="crashExitBtn">Exit</button>
          </div>
        </div>
        <div id="bootOverlay" style="display:none;"></div>
      </div>
    </div>
    <div id="sidePanel">
      <div class="panel-section">
        <h4>Stats</h4>
        <div class="stat-row" id="hudScore">Landed: 0  Violation: 0s  Exits: 0</div>
      </div>
      <div class="panel-section">
        <h4>Display Toggles</h4>
        <div class="toggle-row">
          <button class="toggle-btn" data-toggle="showAirport"   title="Airport label (A)">A</button>
          <button class="toggle-btn" data-toggle="showRings"     title="Radar rings (R)">R</button>
          <button class="toggle-btn" data-toggle="showVor"       title="VOR stations (V)">V</button>
          <button class="toggle-btn" data-toggle="showNdb"       title="NDB stations (N)">N</button>
          <button class="toggle-btn" data-toggle="showWaypoints" title="Waypoints (W)">W</button>
          <button class="toggle-btn" data-toggle="showRunwayNames" title="Runway names (U)">U</button>
          <button class="toggle-btn" data-toggle="aircraftDetails" title="Aircraft details (D)">D</button>
        </div>
      </div>
      <div class="panel-section">
        <h4>STAR Procedures</h4>
        <div class="toggle-row">
          <button class="toggle-btn" data-toggle="showStar1" title="NORTH1 (1)">1</button>
          <button class="toggle-btn" data-toggle="showStar2" title="NORTH2 (2)">2</button>
          <button class="toggle-btn" data-toggle="showStar3" title="NORTH3 (3)">3</button>
          <button class="toggle-btn" data-toggle="showStar4" title="SOUTH1 (4)">4</button>
          <button class="toggle-btn" data-toggle="showStar5" title="SOUTH2 (5)">5</button>
          <button class="toggle-btn" data-toggle="showStar6" title="SOUTH3 (6)">6</button>
        </div>
      </div>
      <div class="panel-section">
        <h4>Spawn Directions</h4>
        <div class="dir-grid">
          <div class="empty"></div>
          <button class="toggle-btn" data-dir="N" title="Toggle North spawn (Up)">N</button>
          <div class="empty"></div>
          <button class="toggle-btn" data-dir="W" title="Toggle West spawn (Left)">W</button>
          <div class="empty"></div>
          <button class="toggle-btn" data-dir="E" title="Toggle East spawn (Right)">E</button>
          <div class="empty"></div>
          <button class="toggle-btn" data-dir="S" title="Toggle South spawn (Down)">S</button>
          <div class="empty"></div>
        </div>
      </div>
      <div class="panel-section">
        <h4>Spawn Rate</h4>
        <div class="rate-row">
          <button class="toggle-btn" id="rateMinus" title="- (faster)">-</button>
          <span class="stat-row" id="hudSpawnRate">--s</span>
          <button class="toggle-btn" id="ratePlus" title="+ (slower)">+</button>
        </div>
      </div>
      <div class="panel-section" id="stripsSection">
        <h4>Aircraft</h4>
        <div id="strips"></div>
      </div>
    </div>
  </div>
  <div id="controls">
    <input id="cmd" type="text" placeholder="CALLSIGN COMMAND (e.g. DL123 C 270)  --  Esc to release focus, click radar/strip to select" autocomplete="off" />
    <button id="speedBtn" title="TAB to toggle">Speed: 1x</button>
    <button id="pauseBtn" title="P to toggle">Pause</button>
    <button id="restartBtn" title="Clear all stats and start over">Restart</button>
  </div>
</div>

<script>
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
const cmdInput = document.getElementById('cmd');
const speedBtn = document.getElementById('speedBtn');

// ---------------------------------------------------------------------------
// Engine abstraction.
//
// The frontend talks to one of two implementations of the same 6-method
// interface:
//   - HttpEngine     : posts to Flask (app.py). Used for local play.
//   - PyodideEngine  : runs SimulationEnv inside the browser via Pyodide.
//                      Used for static deployments (e.g. GitHub Pages).
//
// engine.state()                    -> state dict
// engine.step()                     -> state dict (advances fast_forward ticks)
// engine.command(callsign, cmd)     -> {ok, category, atc?, pilot?, message?, callsign}
// engine.setSpeed(multiplier)       -> {ok, fast_forward}
// engine.setSpawnRate(rate)         -> {ok, spawn_rate}
// engine.setSpawnDirections(dirs)   -> {ok, spawn_directions}
//
// Auto-selection: if GET /state returns valid JSON, use HttpEngine. Otherwise
// fall back to PyodideEngine. Force a specific engine with ?engine=http or
// ?engine=pyodide in the URL.
// ---------------------------------------------------------------------------

async function postJson(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body || {}),
  });
  return r.json();
}

async function getJson(url) {
  const r = await fetch(url);
  return r.json();
}

class HttpEngine {
  async init() { /* nothing to do — Flask is already running */ }
  state()                    { return getJson('/state'); }
  step()                     { return postJson('/step', {}); }
  command(callsign, command) { return postJson('/command', {callsign, command}); }
  setSpeed(multiplier)       { return postJson('/speed', {multiplier}); }
  setSpawnRate(rate)         { return postJson('/spawn_rate', {rate}); }
  setSpawnDirections(dirs)   { return postJson('/spawn_directions', {directions: dirs}); }
  restart(opts)              { return postJson('/restart', opts || {}); }
  startRecording()           { return postJson('/recording/start', {}); }
  stopRecording()            { return postJson('/recording/stop', {}); }
  getAuto()                  { return getJson('/auto'); }
  setAuto(on)                { return postJson('/auto', {on}); }
  get hasAuto()              { return true; }
}

const PYODIDE_CDN = 'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js';
const ENV_BASE = './'; // relative to index.html; build_pages.py copies environment/ next to index.html

const PYODIDE_BOOTSTRAP = `
import json
from environment import SimulationEnv

_sim = SimulationEnv(airport_name='test', star_mode=True, spawn_single=False)

def state():
    return json.dumps(_sim.get_state())

def step():
    for _ in range(_sim.fast_forward):
        _sim.step(1.0)
    return json.dumps(_sim.get_state())

def command(callsign, cmd):
    r = _sim.command(callsign, cmd)
    return json.dumps({
        'ok': r.get('ok', False),
        'category': r.get('category'),
        'atc': r.get('atc'),
        'pilot': r.get('pilot'),
        'message': r.get('message'),
        'callsign': r.get('callsign', callsign),
    })

def set_speed(multiplier):
    _sim.set_speed(int(multiplier))
    return json.dumps({'ok': True, 'fast_forward': _sim.fast_forward})

def set_spawn_rate(rate):
    _sim.set_spawn_rate(int(rate))
    return json.dumps({'ok': True, 'spawn_rate': _sim.spawn_rate})

def set_spawn_directions(dirs):
    _sim.set_spawn_directions(list(dirs))
    return json.dumps({'ok': True, 'spawn_directions': list(_sim.spawn_directions)})

def restart(spawn_single, star_mode, airport_name):
    _sim.restart(
        spawn_single=None if spawn_single is None else bool(spawn_single),
        star_mode=None if star_mode is None else bool(star_mode),
        airport_name=None if airport_name is None else str(airport_name),
    )
    return json.dumps(_sim.get_state())

def start_recording():
    ok = _sim.start_recording()
    return json.dumps({'ok': bool(ok), 'recording': _sim.is_recording()})

def stop_recording():
    csv_text, filename = _sim.stop_recording()
    return json.dumps({
        'ok': csv_text is not None,
        'csv': csv_text or '',
        'filename': filename or '',
        'recording': _sim.is_recording(),
    })
`;

class PyodideEngine {
  constructor() {
    this.py = null;
    this.boot = null;
  }
  async _loadPyodideScript() {
    if (window.loadPyodide) return;
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = PYODIDE_CDN;
      s.onload = resolve;
      s.onerror = () => reject(new Error('failed to load pyodide.js'));
      document.head.appendChild(s);
    });
  }
  async _mountEnvFiles() {
    const manifest = await (await fetch(ENV_BASE + 'env_manifest.json')).json();
    // Manifest is a flat list of relative paths, e.g. "environment/core/aircraft.py".
    const FS = this.py.FS;
    const ensureDir = (p) => {
      const parts = p.split('/').filter(Boolean);
      let cur = '';
      for (const part of parts) {
        cur += '/' + part;
        try { FS.mkdir(cur); } catch (e) { /* exists */ }
      }
    };
    await Promise.all(manifest.map(async (rel) => {
      const text = await (await fetch(ENV_BASE + rel)).text();
      const dir = '/' + rel.split('/').slice(0, -1).join('/');
      ensureDir(dir);
      FS.writeFile('/' + rel, text);
    }));
  }
  async init(onProgress) {
    if (onProgress) onProgress('Loading Pyodide…');
    await this._loadPyodideScript();
    this.py = await window.loadPyodide();
    if (onProgress) onProgress('Loading simulator…');
    await this._mountEnvFiles();
    // Make /environment importable.
    this.py.runPython('import sys; sys.path.insert(0, "/")');
    this.py.runPython(PYODIDE_BOOTSTRAP);
    this.boot = this.py.globals;
    if (onProgress) onProgress('');
  }
  _call(name, ...args) {
    const fn = this.boot.get(name);
    const result = fn(...args);
    fn.destroy && fn.destroy();
    return JSON.parse(result);
  }
  async state()                    { return this._call('state'); }
  async step()                     { return this._call('step'); }
  async command(callsign, cmd)     { return this._call('command', callsign, cmd); }
  async setSpeed(multiplier)       { return this._call('set_speed', multiplier); }
  async setSpawnRate(rate)         { return this._call('set_spawn_rate', rate); }
  async setSpawnDirections(dirs)   { return this._call('set_spawn_directions', dirs); }
  async restart(opts)              {
    const o = opts || {};
    return this._call('restart', o.spawn_single ?? null, o.star_mode ?? null, o.airport_name ?? null);
  }
  async startRecording()           { return this._call('start_recording'); }
  async stopRecording()            { return this._call('stop_recording'); }
  // AUTO is backend-only — not available in the in-browser (Pyodide) build.
  async getAuto()                  { return {on: false, available: false}; }
  async setAuto(_on)               { return {ok: false, on: false, available: false}; }
  get hasAuto()                    { return false; }
}

async function selectEngine() {
  const forced = new URLSearchParams(location.search).get('engine');
  if (forced === 'pyodide') return new PyodideEngine();
  if (forced === 'http')    return new HttpEngine();
  // Auto-detect: probe /state with a short timeout.
  try {
    const ctl = new AbortController();
    const t = setTimeout(() => ctl.abort(), 1500);
    const r = await fetch('/state', {signal: ctl.signal});
    clearTimeout(t);
    if (r.ok) {
      const j = await r.json();
      if (j && j.static) return new HttpEngine();
    }
  } catch (e) { /* fall through */ }
  return new PyodideEngine();
}

let engine = null;

function isTyping() {
  const el = document.activeElement;
  if (!el) return false;
  const tag = el.tagName;
  // Any text field swallows keys — the command box AND the landing-page
  // username/password inputs. Otherwise typing a name like "Raven" would fire
  // the R/V/N display shortcuts.
  return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
}

function fitRadar() {
  const area = document.getElementById('radarArea');
  const wrap = document.getElementById('radarWrap');
  const w = area.clientWidth;
  const h = area.clientHeight;
  const side = Math.max(0, Math.min(w, h));
  wrap.style.width = side + 'px';
  wrap.style.height = side + 'px';
}

function drawRings() {
  if (!toggleState.showRings || !staticData) return;
  const {nm_per_pixel, airport} = staticData;
  const cx = airport.coordinates.x;
  const cy = airport.coordinates.y;
  ctx.strokeStyle = '#00ff00';
  ctx.lineWidth = 1;
  for (const nm of [5, 10, 15, 20, 25, 30]) {
    ctx.beginPath();
    ctx.arc(cx, cy, nm / nm_per_pixel, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawRunways() {
  if (!staticData) return;
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#cccccc';
  ctx.lineWidth = 1;
  ctx.font = '13px monospace';
  for (const [pairId, pairData] of Object.entries(staticData.runways)) {
    const thresholds = pairData.thresholds || {};
    const keys = Object.keys(thresholds);
    if (keys.length < 2) continue;
    const t1 = thresholds[keys[0]];
    const t2 = thresholds[keys[1]];
    ctx.beginPath();
    ctx.moveTo(t1.x, t1.y);
    ctx.lineTo(t2.x, t2.y);
    ctx.stroke();
    if (toggleState.showRunwayNames) {
      for (const [name, t] of [[keys[0], t1], [keys[1], t2]]) {
        let ox = 40, oy = 0;
        const head2 = name.slice(0, 2);
        if (/^\d{2}$/.test(head2)) {
          const heading = parseInt(head2, 10);
          const angle = ((heading * 10 + 180) % 360) * Math.PI / 180;
          ox = 50 * Math.sin(angle);
          oy = 50 * Math.cos(angle);
        }
        ctx.fillText(name, t.x + ox - 10, t.y + oy + 4);
      }
    }
  }
}

function drawAirportLabel() {
  if (!toggleState.showAirport || !staticData) return;
  const {airport} = staticData;
  const cx = airport.coordinates.x;
  const cy = airport.coordinates.y;
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px monospace';
  const w = ctx.measureText(airport.icao).width;
  ctx.fillText(airport.icao, cx - w / 2, cy - 18);
}

function drawVors() {
  if (!toggleState.showVor || !staticData) return;
  ctx.fillStyle = '#0064ff';
  ctx.strokeStyle = '#0064ff';
  ctx.font = '13px monospace';
  for (const [vorId, vor] of Object.entries(staticData.vor_stations)) {
    const {x, y} = vor.coordinates;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillText(vorId, x - 10, y - 10);
  }
}

function drawNdbs() {
  if (!toggleState.showNdb || !staticData) return;
  ctx.fillStyle = '#ff00ff';
  ctx.strokeStyle = '#ff00ff';
  ctx.font = '13px monospace';
  for (const [ndbId, ndb] of Object.entries(staticData.ndb_stations)) {
    const {x, y} = ndb.coordinates;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillText(ndbId, x - 10, y - 12);
  }
}

function drawWaypoints() {
  if (!toggleState.showWaypoints || !staticData) return;
  ctx.strokeStyle = '#ffff00';
  ctx.fillStyle = '#ffff00';
  ctx.lineWidth = 2;
  ctx.font = '13px monospace';
  for (const [wptId, wpt] of Object.entries(staticData.rnav_waypoints)) {
    const {x, y} = wpt.coordinates;
    const s = 6;
    ctx.beginPath();
    ctx.moveTo(x - s, y);
    ctx.lineTo(x, y - s);
    ctx.lineTo(x + s, y);
    ctx.lineTo(x, y + s);
    ctx.closePath();
    ctx.stroke();
    ctx.fillText(wptId, x - 10, y - 10);
  }
}

// Strip tag (right-panel banners): shows current->target when commanded values
// differ from current. Radar tag (drawAircraft) uses radar=true to suppress
// the ->target text; the visual cues (dashed heading line + climb/descend
// arrow drawn next to the dot) carry that information instead.
function aircraftTag(ac, ctrl, radar = false) {
  if (ctrl && ac.star) return `${ac.callsign} ${ac.star}`;

  const ias = Math.round(ac.airspeed);
  const alt = Math.floor(ac.altitude / 100);
  const hdg = Math.round(ac.heading);
  const tIas = Math.round(ac.target_airspeed);
  const tAlt = Math.floor(ac.target_altitude / 100);
  const tHdg = Math.round(ac.target_heading);
  const iasStr = (!radar && ias !== tIas) ? `${ias}->${tIas}` : `${ias}`;
  const altStr = (!radar && alt !== tAlt) ? `${alt}->${tAlt}` : `${alt}`;
  const hdgPadded = String(hdg).padStart(3, '0');
  const hdgStr = (!radar && hdg !== tHdg)
    ? `${hdgPadded}->${String(tHdg).padStart(3, '0')}`
    : hdgPadded;

  if (ac.holding) return `${ac.callsign} ${iasStr} ${altStr} H`;
  if (ac.target_wpt) return `${ac.callsign} ${iasStr} ${altStr} ${ac.target_wpt}`;
  if (ac.runway) {
    const altPart = (ac.gs && !ctrl) ? 'GS' : altStr;
    const hdgPart = (ac.loc && !ctrl) ? 'LOC' : hdgStr;
    const appendix = [];
    if (!ac.loc) appendix.push('loc');
    if (!ac.gs) appendix.push('gs');
    let out = `${ac.callsign} ${iasStr} ${altPart} ${hdgPart} ${ac.runway}`;
    if (appendix.length) out += ' ' + appendix.join(' ');
    return out;
  }
  return `${ac.callsign} ${iasStr} ${altStr} ${hdgStr}`;
}

function drawTargetHeadingLine(ac) {
  if (ac.loc) return;
  if (Math.round(ac.target_heading) === Math.round(ac.heading)) return;
  const rad = ac.target_heading * Math.PI / 180;
  const dx = Math.sin(rad);
  const dy = -Math.cos(rad);
  const startX = ac.x + 5 * dx;
  const startY = ac.y + 5 * dy;
  const endX = ac.x + 30 * dx;
  const endY = ac.y + 30 * dy;
  ctx.save();
  ctx.strokeStyle = '#ffeb3b';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(endX, endY);
  ctx.stroke();
  ctx.restore();
}

function drawAltitudeArrow(ac) {
  if (ac.gs) return;
  const cur = Math.floor(ac.altitude / 100);
  const tgt = Math.floor(ac.target_altitude / 100);
  if (cur === tgt) return;
  const climbing = tgt > cur;
  const cx = ac.x + 12;
  const cy = ac.y;
  ctx.save();
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath();
  if (climbing) {
    ctx.moveTo(cx, cy - 6);
    ctx.lineTo(cx - 4, cy + 3);
    ctx.lineTo(cx + 4, cy + 3);
  } else {
    ctx.moveTo(cx, cy + 6);
    ctx.lineTo(cx - 4, cy - 3);
    ctx.lineTo(cx + 4, cy - 3);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawAircraft(state) {
  if (!state) return;
  ctx.font = '13px monospace';
  for (const ac of state.aircraft) {
    const traj = ac.trajectory || [];
    for (let i = 0; i < traj.length; i++) {
      const [tx, ty] = traj[i];
      const alpha = traj.length > 1 ? (i + 1) / traj.length : 1;
      ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(tx, ty, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    drawTargetHeadingLine(ac);
    const color = ac.collision_warning ? '#ff0000' : '#ffffff';
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(ac.x, ac.y, 5, 0, Math.PI * 2);
    ctx.fill();
    drawAltitudeArrow(ac);
    const label = toggleState.aircraftDetails ? aircraftTag(ac, ctrlHeld, true) : ac.callsign;
    ctx.fillStyle = color;
    const lines = wrapLabel(label, TAG_MAX_CHARS);
    const lineHeight = 14;
    const baseY = ac.y - 12;
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const w = ctx.measureText(line).width;
      const y = baseY - (lines.length - 1 - i) * lineHeight;
      ctx.fillText(line, ac.x - w / 2, y);
    }
  }
}

const TAG_MAX_CHARS = 16;

function wrapLabel(text, maxChars) {
  if (text.length <= maxChars) return [text];
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    if (!current) {
      current = word;
    } else if ((current + ' ' + word).length <= maxChars) {
      current += ' ' + word;
    } else {
      lines.push(current);
      current = word;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function drawStars() {
  if (!staticData) return;
  const procs = staticData.star_procedures || {};
  const wpts = staticData.rnav_waypoints || {};
  ctx.strokeStyle = '#b266ff';
  ctx.lineWidth = 2;
  for (const [toggleKey, procName] of STAR_TOGGLES) {
    if (!toggleState[toggleKey]) continue;
    const steps = procs[procName];
    if (!steps || steps.length < 2) continue;
    ctx.beginPath();
    let started = false;
    for (const step of steps) {
      const wp = wpts[step.waypoint];
      if (!wp) continue;
      const {x, y} = wp.coordinates;
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function draw(state) {
  if (!staticData) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#191919';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawRings();
  drawRunways();
  drawAirportLabel();
  drawVors();
  drawNdbs();
  drawStars();
  drawWaypoints();
  drawFlightPlanOverlay(state);
  drawAircraft(state);
}

// AUTO flight-plan overlay: light-blue polyline of each plane's remaining
// planned path (red if the pair is in an unresolved conflict). Drawn under the
// aircraft markers. The server sends only the remaining tail of each plan.
function drawFlightPlanOverlay(state) {
  if (!state || !state.flight_plans) return;
  const conflictCs = new Set();
  if (state.plan_conflicts) {
    for (const c of state.plan_conflicts) { conflictCs.add(c.a); conflictCs.add(c.b); }
  }
  ctx.save();
  for (const cs of Object.keys(state.flight_plans)) {
    const plan = state.flight_plans[cs];
    if (!plan.states || plan.states.length < 2) continue;
    if (conflictCs.has(cs)) {
      ctx.strokeStyle = 'rgba(255, 80, 80, 0.75)';
      ctx.lineWidth = 1.4;
    } else {
      ctx.strokeStyle = 'rgba(140, 200, 255, 0.6)';
      ctx.lineWidth = 1.0;
    }
    ctx.beginPath();
    ctx.moveTo(plan.states[0].x, plan.states[0].y);
    for (let i = 1; i < plan.states.length; i++) ctx.lineTo(plan.states[i].x, plan.states[i].y);
    ctx.stroke();
  }
  ctx.restore();
}

function renderStrips(state) {
  stripsEl.innerHTML = '';
  for (const ac of state.aircraft) {
    const div = document.createElement('div');
    div.className = 'strip' + (ac.collision_warning ? ' warn' : '');
    const tag = aircraftTag(ac, ctrlHeld);
    const tagInfo = tag.startsWith(ac.callsign + ' ')
      ? tag.slice(ac.callsign.length + 1)
      : tag;
    div.innerHTML =
      '<div class="cs">' + ac.callsign + '</div>' +
      '<div class="info">' + tagInfo + '</div>';
    div.addEventListener('click', () => {
      cmdInput.value = ac.callsign + ' ';
      cmdInput.focus();
    });
    stripsEl.appendChild(div);
  }
}

function updateHud(state) {
  // Values are numeric (from sim state), so innerHTML is safe here. Time goes
  // on its own line in the right-column readout.
  hudScore.innerHTML =
    `Landed: ${state.scoring.num_landed}  ` +
    `Violation: ${state.scoring.violation_seconds}s  ` +
    `Exits: ${state.scoring.improper_exits}<br>` +
    `Time: ${fmtTime(state.scoring.sim_time)}`;
  // Client-owned (see spawnRate): don't render the ~1s-stale state value, which
  // would lag/flicker the readout right after a +/- click.
  hudSpawnRate.textContent = `${spawnRate}s`;

  // `fastForward` is client-owned (set by setSpeed). Don't overwrite it from
  // `state.fast_forward`: drawn frames are ~1s stale under the fixed-grid loop,
  // so a state fetched just before a speed change would flicker the value back.
  speedBtn.textContent = `Speed: ${fastForward}x`;
  speedBtn.classList.toggle('active', fastForward !== 1);
  ffIndicator.textContent = (fastForward !== 1 && !paused) ? `X${fastForward}` : '';

  pausedIndicator.style.display = paused ? 'block' : 'none';
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  pauseBtn.classList.toggle('active', paused);

  if (state.crash.occurred) {
    crashOverlay.style.display = 'flex';
    crashMsg.textContent = state.crash.message;
  } else {
    crashOverlay.style.display = 'none';
  }

  refreshDirButtons(state.spawn_directions, state.star_mode);
  renderStrips(state);
  updateAutoUi(state);

  // The sim terminates on a crash — offer to save the run once (logged-in only;
  // maybeSaveRun no-ops for guests / empty runs). Edge-detected so it fires a
  // single time, not every tick the crash overlay is up.
  if (state.crash && state.crash.occurred && !_prevCrash) {
    _prevCrash = true;
    maybeSaveRun(runningAirportValue());
  }
}

function updateAutoUi(state) {
  // AUTO is shown only with a backend (torch can't run in Pyodide) and only
  // for the SIMULATED airport.
  const isSimulated = !!state && state.airport_name === 'test';
  autoBtn.style.display = (backendAvailable && isSimulated) ? 'block' : 'none';
  autoBtn.classList.toggle('active', autoOn);
  if (!autoBtn.disabled) autoBtn.textContent = autoOn ? 'AUTO ON' : 'AUTO';
  // PLANNING… overlay (top-left) while the backend runs a replan (sim is held).
  const planning = autoOn && !!state && !!state.planning;
  planningIndicator.style.display = planning ? 'block' : 'none';
  if (planning) ffIndicator.textContent = '';
  // While the planner is driving, manual command entry is disabled.
  cmdInput.disabled = autoOn;
  cmdInput.placeholder = autoOn
    ? 'AUTO engaged — the planner is controlling all aircraft'
    : 'CALLSIGN COMMAND (e.g. DL123 C 270)  --  Esc to release focus, click radar/strip to select';
}

function clearScript() {
  const el = document.getElementById('scriptList');
  if (el) el.innerHTML = '';
}

function refreshToggleButtons() {
  document.querySelectorAll('.toggle-btn[data-toggle]').forEach(btn => {
    const key = btn.dataset.toggle;
    btn.classList.toggle('active', !!toggleState[key]);
  });
}

function refreshDirButtons(activeDirs, starMode) {
  document.querySelectorAll('.toggle-btn[data-dir]').forEach(btn => {
    btn.classList.toggle('active', activeDirs.includes(btn.dataset.dir));
    btn.disabled = !!starMode;
    btn.style.opacity = starMode ? '0.4' : '';
  });
}

async function init() {
  engine = await selectEngine();
  if (engine instanceof PyodideEngine) {
    showBootMessage('Loading Pyodide…');
    await engine.init(showBootMessage);
    hideBootMessage();
  } else {
    await engine.init();
  }
  backendAvailable = !!(engine && engine.hasAuto);
  const state = await engine.state();
  staticData = state.static;
  resizeCanvas(staticData.radar_side);
  fitRadar();
  window.addEventListener('resize', fitRadar);
  lastState = state;
  spawnRate = state.spawn_rate;
  fastForward = state.fast_forward;   // sync client-owned speed from the server
  if (airportSelect) airportSelect.value = state.airport_name || 'test';
  if (backendAvailable) {
    try { const a = await engine.getAuto(); autoOn = !!a.on; } catch (e) { autoOn = false; }
  }
  refreshToggleButtons();
  draw(state);
  updateHud(state);
  scheduleTick();
}

const TICK_MS = 1000;

function perfNow() {
  return (typeof performance !== 'undefined' && performance.now)
    ? performance.now() : Date.now();
}

// Render loop on a FIXED display grid.
//
// We fetch the next state (variable latency — HTTP jitter, or a slow Pyodide
// step), but DRAW it at the next 1-second grid boundary rather than the instant
// the request returns. Drawing at fetch-completion time (what setInterval/await
// effectively did) means any jitter in step latency shows up as an uneven
// "fast-then-wait" rhythm. Pinning draws to the grid absorbs that jitter, so the
// visible cadence stays even as long as a step takes < TICK_MS.
let _renderT0 = 0;
let _renderFrame = 0;
// Set while a restart / airport-switch is replacing the sim — the render loop
// must not start a new step/draw during this window.
let _restarting = false;
// Set while a speed change is being applied — same idea: freeze the loop so a
// buffered old-speed frame can't draw and no new step is taken until the server
// has the new speed. Then we resync and redraw at the new speed immediately.
let _repacing = false;
// Bumped on every restart/airport-switch. Each render tick stamps itself with
// the epoch at fetch time; if the epoch changed by the time it would draw, the
// frame is from before the restart and is discarded. A boolean flag alone
// misses a fetch that resolves just AFTER the restart finishes (its draw was
// already queued for the next grid boundary) — that's the leftover flicker.
let _renderEpoch = 0;

async function scheduleTick() {
  // Idle cheaply while on the landing page — the engine may already be booted
  // (we warm it in the background), but the sim must not advance until the
  // player actually enters.
  if (!inSim) {
    setTimeout(scheduleTick, 200);
    return;
  }
  if (_renderT0 === 0) _renderT0 = perfNow();
  // A restart or speed change owns the display right now — don't step or draw.
  if (_restarting || _repacing) {
    setTimeout(scheduleTick, 60);
    return;
  }
  // Stamp the epoch BEFORE the grid wait. If a restart or speed toggle bumps it
  // while we're waiting for the boundary, the callback below sees the mismatch
  // and bails — otherwise this already-scheduled frame would fire at the old
  // speed right before setSpeed's fresh redraw, giving two quick frames.
  const epoch = _renderEpoch;
  // Find the next grid boundary and WAIT for it; only then advance + draw. We
  // deliberately do NOT pre-fetch the next state ahead of the boundary: a step
  // advances the sim irreversibly, so a step taken speculatively before a speed
  // toggle would bake in the old speed (e.g. a +10s jump that then shows right
  // after you slow to 1x — you can't un-advance it). Stepping at the boundary
  // reads whatever speed is in effect at that instant.
  _renderFrame++;
  const now = perfNow();
  let target = _renderT0 + _renderFrame * TICK_MS;
  if (now - target > TICK_MS) {
    // Fell behind (slow engine, or a backgrounded tab paused our timers) —
    // resync the grid so we don't fire a burst of catch-up frames.
    _renderT0 = now;
    _renderFrame = 0;
    target = now;
  }
  setTimeout(async () => {
    // Bail if anything changed while we waited (toggle/restart bumped the epoch
    // or raised a flag) — don't step at a now-stale speed.
    if (epoch !== _renderEpoch || _restarting || _repacing) { scheduleTick(); return; }
    // While AUTO is loading (policy + worker pool warming up) the sim must not
    // advance — only refresh the view.
    const freeze = paused || autoLoading;
    let state;
    try {
      state = freeze ? await engine.state() : await engine.step();
    } catch (e) {
      setTimeout(scheduleTick, TICK_MS);   // transient hiccup — retry next grid
      return;
    }
    if (epoch !== _renderEpoch || _restarting || _repacing) {
      // A restart/speed change landed mid-step — drop this (now stale) result.
      scheduleTick();
      return;
    }
    lastState = state;
    draw(state);
    updateHud(state);
    scheduleTick();   // schedule the next boundary
  }, Math.max(0, target - now));
}

async function setSpeed(multiplier) {
  // Optimistic: reflect the intent immediately so the toggle feels instant and
  // never fights a stale drawn frame.
  fastForward = multiplier;
  speedBtn.textContent = `Speed: ${fastForward}x`;
  speedBtn.classList.toggle('active', fastForward !== 1);
  ffIndicator.textContent = (fastForward !== 1 && !paused) ? `X${fastForward}` : '';

  // Freeze the loop SYNCHRONOUSLY — before any await — so no step is issued at
  // the OLD speed during the /speed round-trip. The epoch bump also drops any
  // step that happens to be mid-flight at this instant.
  _repacing = true;
  _renderEpoch++;
  try {
    const r = await engine.setSpeed(multiplier);   // server now has the new speed
    fastForward = r.fast_forward;                  // reconcile (server clamps to 1/10)
    speedBtn.textContent = `Speed: ${fastForward}x`;
    speedBtn.classList.toggle('active', fastForward !== 1);
    ffIndicator.textContent = (fastForward !== 1 && !paused) ? `X${fastForward}` : '';
  } finally {
    // Always resume, even if the request failed, so the loop never stays frozen.
    // _renderFrame = -1 makes the next loop frame's target land at "now", so it
    // fetches one fresh step at the new speed and redraws immediately.
    _renderT0 = 0;
    _renderFrame = -1;
    _repacing = false;
  }
}

async function bumpSpawnRate(delta) {
  const next = Math.max(20, spawnRate + delta);
  if (next === spawnRate) return;
  spawnRate = next;                              // optimistic — instant readout
  hudSpawnRate.textContent = `${spawnRate}s`;
  const r = await engine.setSpawnRate(next);     // reconcile with server (it clamps)
  if (r && typeof r.spawn_rate === 'number') {
    spawnRate = r.spawn_rate;
    hudSpawnRate.textContent = `${spawnRate}s`;
  }
}

async function toggleSpawnDir(dir) {
  if (!lastState) return;
  const cur = [...lastState.spawn_directions];
  let next;
  if (cur.includes(dir)) {
    if (cur.length <= 1) {
      next = cur;
    } else {
      next = cur.filter(d => d !== dir);
    }
  } else {
    next = [...cur, dir];
  }
  await engine.setSpawnDirections(next);
}

speedBtn.addEventListener('click', () => setSpeed(fastForward === 1 ? 10 : 1));
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  pauseBtn.classList.toggle('active', paused);
  pausedIndicator.style.display = paused ? 'block' : 'none';
  ffIndicator.textContent = (fastForward !== 1 && !paused) ? `X${fastForward}` : '';
});

async function applyRestart(opts) {
  // Shared by the airport dropdown and the Restart button. Wipes stats /
  // aircraft and re-syncs AUTO state from the backend (the backend turns AUTO
  // off when switching away from SIMULATED).
  // Take ownership of the display so the render loop doesn't draw a stale
  // pre-restart /step on top of the fresh state (the "aircraft briefly reappear"
  // flicker). Bumping the epoch invalidates any fetch already in flight even if
  // it resolves after _restarting is cleared.
  _restarting = true;
  _renderEpoch++;
  try {
    const newState = await engine.restart(opts || {});
    lastState = newState;
    staticData = newState.static;
    spawnRate = newState.spawn_rate;       // restart resets the rate server-side (90s default)
    fastForward = newState.fast_forward;   // restart resets speed to 1x server-side
    resizeCanvas(staticData.radar_side);
    fitRadar();
    if (airportSelect) airportSelect.value = newState.airport_name || 'test';
    if (backendAvailable) {
      try { const a = await engine.getAuto(); autoOn = !!a.on; } catch (e) { autoOn = false; }
    } else {
      autoOn = false;
    }
    clearScript();
    _renderT0 = 0;        // resync the render grid to the restart instant
    _renderFrame = 0;
    draw(newState);
    updateHud(newState);
    // Fresh run begins: re-arm the save offer and crash edge-detector.
    _runConcluded = false;
    _prevCrash = false;
  } finally {
    _restarting = false;
  }
}

airportSelect.addEventListener('change', async () => {
  if (airportSelect.disabled) return;
  airportSelect.disabled = true;
  try {
    // Switching airports ends the current run — offer to save it under the
    // airport it was actually flown on (lastState still holds the old sim).
    await maybeSaveRun(runningAirportValue());
    const airport = airportSelect.value;
    await applyRestart({airport_name: airport, star_mode: airport === 'test'});
  } finally {
    airportSelect.disabled = false;
  }
});

restartBtn.addEventListener('click', async () => {
  if (!lastState || restartBtn.disabled) return;
  restartBtn.disabled = true;
  try {
    await maybeSaveRun(runningAirportValue());   // offer to save before wiping
    await applyRestart({});   // keep current airport, clear everything
  } finally {
    restartBtn.disabled = false;
  }
});

autoBtn.addEventListener('click', async () => {
  if (autoBtn.disabled) return;
  const turningOn = !autoOn;
  if (turningOn) {
    if (TraconAPI.currentUser()) {
      // Logged in: AUTO hands the traffic to the autopilot, so the run is no
      // longer the player's own. Confirm (every time) that it forfeits saving.
      const ok = await showModal(
        'Enable AUTO?',
        'AUTO lets the autopilot fly all the traffic. Scores can no longer be ' +
        'saved to the leaderboard for the rest of this session.',
        'Enable AUTO', 'Cancel');
      if (!ok) return;   // leave AUTO off; button untouched
    } else {
      // Guest: nothing to forfeit (guests can't save anyway) — just inform.
      await showModal(
        'Guest mode',
        'Note that you cannot save your score in guest mode.',
        'OK', null);
    }
  }
  autoBtn.disabled = true;
  if (turningOn) {
    autoBtn.textContent = 'AUTO …';   // warmup can take a few seconds
    autoLoading = true;               // freeze the sim until the pool is ready
  }
  try {
    const r = await engine.setAuto(turningOn);
    if (r && r.ok) {
      autoOn = !!r.on;
      if (autoOn) _autoUsedThisSession = true;   // disables saving this session
    } else {
      autoOn = false;
      if (r && r.message) appendScript('invalid', `AUTO: ${r.message}`);
    }
  } catch (e) {
    autoOn = false;
    appendScript('invalid', `AUTO error: ${e}`);
  } finally {
    autoLoading = false;
    autoBtn.disabled = false;
    if (lastState) updateHud(lastState);
  }
});

document.querySelectorAll('.toggle-btn[data-toggle]').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.toggle;
    toggleState[key] = !toggleState[key];
    refreshToggleButtons();
    if (lastState) draw(lastState);
  });
});

document.querySelectorAll('.toggle-btn[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => toggleSpawnDir(btn.dataset.dir));
});

document.getElementById('ratePlus').addEventListener('click', () => bumpSpawnRate(10));
document.getElementById('rateMinus').addEventListener('click', () => bumpSpawnRate(-10));

cmdInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Escape') {
    cmdInput.blur();
    return;
  }
  if (e.key !== 'Enter') return;
  const text = cmdInput.value.trim();
  if (!text) return;
  const parts = text.split(/\s+/);
  if (parts.length < 2) {
    cmdInput.value = '';
    return;
  }
  const callsign = parts[0];
  const cmd = parts.slice(1).join(' ');
  const r = await engine.command(callsign, cmd);
  if (r && r.category === 'invalid') {
    appendScript('invalid', `INVALID: ${r.message}`);
  } else if (r && r.category === 'unable') {
    appendScript('unable', `UNABLE: ${r.message}`);
  } else if (r && r.category === 'success') {
    if (r.atc) appendScript('atc', r.atc);
    if (r.pilot) appendScript('pilot', r.pilot);
    cmdInput.value = '';
  }
});

const SCRIPT_MAX = 100;
const scriptMessages = [];
const scriptListEl = document.getElementById('scriptList');

function appendScript(type, text) {
  scriptMessages.push({type, text});
  while (scriptMessages.length > SCRIPT_MAX) scriptMessages.shift();
  const div = document.createElement('div');
  div.className = 'script-msg ' + type;
  div.textContent = text;
  scriptListEl.appendChild(div);
  while (scriptListEl.childElementCount > SCRIPT_MAX) {
    scriptListEl.removeChild(scriptListEl.firstChild);
  }
  scriptListEl.scrollTop = scriptListEl.scrollHeight;
}

function repaintAfterCtrl() {
  if (lastState) {
    draw(lastState);
    renderStrips(lastState);
  }
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Control' && !ctrlHeld) {
    ctrlHeld = true;
    repaintAfterCtrl();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'Control' && ctrlHeld) {
    ctrlHeld = false;
    repaintAfterCtrl();
  }
});
window.addEventListener('blur', () => {
  if (ctrlHeld) {
    ctrlHeld = false;
    repaintAfterCtrl();
  }
});

document.addEventListener('keydown', (e) => {
  if (!inSim || isTyping()) return;   // ignore shortcuts on the landing page
  const key = e.key;
  if (key === 'Tab') {
    e.preventDefault();
    setSpeed(fastForward === 1 ? 10 : 1);
    return;
  }
  if (key === 'p' || key === 'P') {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    pauseBtn.classList.toggle('active', paused);
    pausedIndicator.style.display = paused ? 'block' : 'none';
    ffIndicator.textContent = (fastForward !== 1 && !paused) ? `X${fastForward}` : '';
    return;
  }
  const toggleMap = {
    a: 'showAirport', A: 'showAirport',
    r: 'showRings', R: 'showRings',
    v: 'showVor', V: 'showVor',
    n: 'showNdb', N: 'showNdb',
    w: 'showWaypoints', W: 'showWaypoints',
    u: 'showRunwayNames', U: 'showRunwayNames',
    d: 'aircraftDetails', D: 'aircraftDetails',
    '1': 'showStar1', '2': 'showStar2', '3': 'showStar3',
    '4': 'showStar4', '5': 'showStar5', '6': 'showStar6',
  };
  if (toggleMap[key]) {
    toggleState[toggleMap[key]] = !toggleState[toggleMap[key]];
    refreshToggleButtons();
    if (lastState) draw(lastState);
    return;
  }
  if (key === '+' || key === '=') { bumpSpawnRate(10); return; }
  if (key === '-' || key === '_') { bumpSpawnRate(-10); return; }
  if (key === 'ArrowUp')    { e.preventDefault(); toggleSpawnDir('N'); return; }
  if (key === 'ArrowDown')  { e.preventDefault(); toggleSpawnDir('S'); return; }
  if (key === 'ArrowLeft')  { e.preventDefault(); toggleSpawnDir('W'); return; }
  if (key === 'ArrowRight') { e.preventDefault(); toggleSpawnDir('E'); return; }
});

canvas.addEventListener('click', (e) => {
  if (!lastState) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * sx;
  const y = (e.clientY - rect.top) * sy;
  let best = null;
  let bestDist = 50;
  for (const ac of lastState.aircraft) {
    const dx = ac.x - x;
    const dy = ac.y - y;
    const d = Math.hypot(dx, dy);
    if (d < bestDist) { bestDist = d; best = ac; }
  }
  if (best) {
    cmdInput.value = best.callsign + ' ';
    cmdInput.focus();
  }
});

// ======================================================================
// Accounts, landing page, leaderboard, and the save-run flow.
//
// All Supabase access goes through window.TraconAPI (web/api.js); this block
// is just UI + glue, so it works identically on the Pyodide (GitHub Pages) and
// Flask (Hugging Face) builds. The simulator engine is warmed in the
// background while the landing page is up, so entering is instant.
// ======================================================================

// Run-lifecycle state (also read by updateHud / scheduleTick / the handlers).
let inSim = false;          // false while the landing page is showing
let _bootPromise = null;    // engine boot, started in the background
let _enteredBefore = false; // first entry rides init()'s fresh sim; later restart
let _runConcluded = false;  // true once we've offered to save the current run
let _prevCrash = false;     // edge-detect the crash transition
let _autoUsedThisSession = false;  // AUTO engaged at least once -> no saving this session

// Landing / modal DOM.
const landingEl   = document.getElementById('landing');
const appEl       = document.getElementById('app');
const authUserEl  = document.getElementById('authUser');
const authPassEl  = document.getElementById('authPass');
const authMsgEl   = document.getElementById('authMsg');
const loginBtn    = document.getElementById('loginBtn');
const guestBtn    = document.getElementById('guestBtn');
const logoutBtn   = document.getElementById('logoutBtn');
const authUserRow = document.getElementById('authUserRow');
const authWhoEl   = document.getElementById('authWho');
const boardAirportEl = document.getElementById('boardAirport');
const boardBodyEl = document.getElementById('boardBody');
const boardNoteEl = document.getElementById('boardNote');
const exitBtn     = document.getElementById('exitBtn');
const saveModalEl = document.getElementById('saveModal');
const saveStatsEl = document.getElementById('saveStats');
const saveYesBtn  = document.getElementById('saveYes');
const saveNoBtn   = document.getElementById('saveNo');

function fmtTime(secs) {
  secs = Math.max(0, Math.round(secs || 0));
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

// Airport ('test'/'egll') of the run that produced the current stats. Prefer
// the running sim's airport (lastState) over the dropdown so that switching
// airports saves the ending run under the OLD airport.
function runningAirportValue() {
  return (lastState && lastState.airport_name) ||
         (airportSelect && airportSelect.value) || 'test';
}

function currentRunStats() {
  const s = (lastState && lastState.scoring) || {};
  return {
    landed: s.num_landed || 0,
    violation_secs: s.violation_seconds || 0,
    exits: s.improper_exits || 0,
    play_secs: s.sim_time || 0,
  };
}

function runHasProgress() {
  const st = currentRunStats();
  return st.play_secs > 0 || st.landed > 0 || st.exits > 0 || st.violation_secs > 0;
}

// --- "Save this run?" modal (Promise<boolean>) ---
let _saveResolve = null;
function askSaveRun(stats, airportValue) {
  saveStatsEl.innerHTML =
    `${TraconAPI.airportLabel(airportValue)}<br>` +
    `Landed <b>${stats.landed}</b> &nbsp; Violation <b>${Math.round(stats.violation_secs)}s</b><br>` +
    `Exits <b>${stats.exits}</b> &nbsp; Time <b>${fmtTime(stats.play_secs)}</b>`;
  saveYesBtn.disabled = false;
  saveNoBtn.disabled = false;
  saveModalEl.style.display = 'flex';
  return new Promise(res => { _saveResolve = res; });
}
function answerSave(v) { const r = _saveResolve; _saveResolve = null; if (r) r(v); }
saveNoBtn.addEventListener('click', () => answerSave(false));
saveYesBtn.addEventListener('click', () => answerSave(true));
saveModalEl.addEventListener('click', (e) => { if (e.target === saveModalEl) answerSave(false); });

// --- Generic styled confirm/info modal (Promise<boolean>) ---
// cancelLabel = null -> single-button info dialog (always resolves true).
const msgModalEl = document.getElementById('msgModal');
const msgTitleEl = document.getElementById('msgTitle');
const msgBodyEl = document.getElementById('msgBody');
const msgOkBtn = document.getElementById('msgOk');
const msgCancelBtn = document.getElementById('msgCancel');
let _msgResolve = null;
function showModal(title, body, okLabel, cancelLabel) {
  msgTitleEl.textContent = title;
  msgBodyEl.textContent = body;
  msgOkBtn.textContent = okLabel || 'OK';
  if (cancelLabel) {
    msgCancelBtn.textContent = cancelLabel;
    msgCancelBtn.style.display = '';
  } else {
    msgCancelBtn.style.display = 'none';
  }
  msgModalEl.style.display = 'flex';
  return new Promise(res => { _msgResolve = res; });
}
function answerMsg(v) {
  msgModalEl.style.display = 'none';
  const r = _msgResolve; _msgResolve = null;
  if (r) r(v);
}
msgOkBtn.addEventListener('click', () => answerMsg(true));
msgCancelBtn.addEventListener('click', () => answerMsg(false));
msgModalEl.addEventListener('click', (e) => { if (e.target === msgModalEl) answerMsg(false); });

// Offer to save the just-ended run. No-op for guests, empty runs, or a run we
// already concluded. Fires at most once per run (via _runConcluded).
async function maybeSaveRun(airportValue) {
  if (_runConcluded) return;
  if (!TraconAPI.enabled() || !TraconAPI.currentUser() || !runHasProgress() || _autoUsedThisSession) {
    _runConcluded = true;
    return;
  }
  const stats = currentRunStats();
  const yes = await askSaveRun(stats, airportValue);
  _runConcluded = true;
  if (!yes) { saveModalEl.style.display = 'none'; return; }
  saveYesBtn.disabled = true;
  saveNoBtn.disabled = true;
  saveStatsEl.innerHTML = 'Saving…';
  const res = await TraconAPI.saveRun(airportValue, stats);
  saveModalEl.style.display = 'none';
  if (!res.ok) alert('Could not save run: ' + (res.message || 'unknown error'));
}

// --- engine boot (background) ---
function startEngineBoot() {
  if (!_bootPromise) {
    _bootPromise = init().catch(err => { _bootPromise = null; throw err; });
  }
  return _bootPromise;
}

// --- enter / exit the simulator ---
async function enterSimulator() {
  loginBtn.disabled = true;
  guestBtn.disabled = true;
  const prevLabel = loginBtn.textContent;
  loginBtn.textContent = 'Loading…';
  try {
    await startEngineBoot();
  } catch (e) {
    loginBtn.disabled = false; guestBtn.disabled = false;
    loginBtn.textContent = prevLabel;
    setAuthMsg('Failed to load the simulator. Reload and try again.', 'err');
    return;
  }
  loginBtn.disabled = false; guestBtn.disabled = false;
  loginBtn.textContent = prevLabel;
  // First entry uses the fresh sim init() built; later entries start a new run.
  if (_enteredBefore) {
    await applyRestart({});      // also re-arms _runConcluded / _prevCrash
  } else {
    _runConcluded = false;
    _prevCrash = false;
  }
  _enteredBefore = true;
  landingEl.style.display = 'none';
  appEl.style.display = '';
  inSim = true;
  fitRadar();
}

async function exitSimulator() {
  exitBtn.disabled = true;
  try {
    await maybeSaveRun(runningAirportValue());
  } finally {
    exitBtn.disabled = false;
  }
  inSim = false;
  appEl.style.display = 'none';
  landingEl.style.display = '';
  refreshLeaderboard();
}
exitBtn.addEventListener('click', exitSimulator);

// Crash-overlay buttons reuse the toolbar Restart / Exit (same save handling).
document.getElementById('crashRestartBtn').addEventListener('click', () => restartBtn.click());
document.getElementById('crashExitBtn').addEventListener('click', () => exitBtn.click());

// --- auth UI ---
function setAuthMsg(msg, cls) {
  authMsgEl.textContent = msg || '';
  authMsgEl.className = cls || '';
}
function refreshAuthRow() {
  const u = TraconAPI.currentUser();
  const signedIn = !!u;
  // Signed in -> only "Signed in as X / Log out" + "Play as X".
  // Logged out -> username/password + "Log in / Sign Up" + "Continue as a Guest".
  authUserRow.style.display = signedIn ? 'flex' : 'none';
  authUserEl.style.display  = signedIn ? 'none' : '';
  authPassEl.style.display  = signedIn ? 'none' : '';
  guestBtn.style.display    = signedIn ? 'none' : '';
  loginBtn.textContent = signedIn ? `Play as ${u.username}` : 'Log in / Sign Up';
  if (signedIn) authWhoEl.textContent = u.username;
}

loginBtn.addEventListener('click', async () => {
  const u = authUserEl.value.trim();
  const p = authPassEl.value;
  // Already signed in and no new credentials typed -> just play.
  if (!u && !p && TraconAPI.currentUser()) { enterSimulator(); return; }
  if (!TraconAPI.enabled()) {
    setAuthMsg('Accounts are not configured on this deployment.', 'err');
    return;
  }
  setAuthMsg('', '');
  loginBtn.disabled = true; guestBtn.disabled = true;
  const res = await TraconAPI.signInOrUp(u, p);
  loginBtn.disabled = false; guestBtn.disabled = false;
  if (!res.ok) { setAuthMsg(res.message, 'err'); refreshAuthRow(); return; }
  refreshAuthRow();
  authPassEl.value = '';
  enterSimulator();
});

guestBtn.addEventListener('click', () => { setAuthMsg('', ''); enterSimulator(); });

logoutBtn.addEventListener('click', async () => {
  await TraconAPI.signOut();
  authUserEl.value = '';
  authPassEl.value = '';
  refreshAuthRow();              // re-shows username/password + guest
  setAuthMsg('Logged out.', 'ok');
});

authUserEl.addEventListener('keydown', e => { if (e.key === 'Enter') authPassEl.focus(); });
authPassEl.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

// --- leaderboard ---
function buildAirportDropdown() {
  boardAirportEl.innerHTML = '';
  for (const a of TraconAPI.airports()) {
    const opt = document.createElement('option');
    opt.value = a.value;
    opt.textContent = a.label;
    boardAirportEl.appendChild(opt);
  }
}
boardAirportEl.addEventListener('change', refreshLeaderboard);

async function refreshLeaderboard() {
  if (!TraconAPI.enabled()) {
    boardBodyEl.innerHTML = '';
    boardNoteEl.textContent = 'Leaderboard not configured on this deployment.';
    return;
  }
  boardNoteEl.textContent = 'Loading…';
  const airport = boardAirportEl.value || 'test';
  const res = await TraconAPI.fetchLeaderboard(airport, 10);
  if (!res.ok) {
    boardBodyEl.innerHTML = '';
    boardNoteEl.textContent = 'Could not load leaderboard.';
    return;
  }
  const me = TraconAPI.currentUser();
  boardBodyEl.innerHTML = '';
  res.rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (me && r.username === me.username) tr.className = 'me';
    tr.innerHTML =
      `<td>${i + 1}</td><td></td>` +
      `<td>${r.landed}</td><td>${Math.round(r.violation_secs)}</td>` +
      `<td>${r.exits}</td><td>${fmtTime(r.play_secs)}</td>`;
    tr.children[1].textContent = r.username;   // textContent: no HTML injection
    boardBodyEl.appendChild(tr);
  });
  boardNoteEl.textContent = res.rows.length ? '' : 'No runs yet — be the first.';
}

// --- bootstrap ---
async function bootstrap() {
  buildAirportDropdown();
  if (!TraconAPI.enabled()) {
    // Guest-only: no Supabase configured. Hide the account inputs, keep guest
    // play, and note it. (This is the state of the plain GitHub Pages build
    // until web/config.js is filled in.)
    authUserEl.style.display = 'none';
    authPassEl.style.display = 'none';
    loginBtn.style.display = 'none';
    setAuthMsg('Accounts / leaderboard not configured — play as guest.', '');
  } else {
    try { await TraconAPI.init(); } catch (e) {}
    refreshAuthRow();
  }
  refreshLeaderboard();
  // Warm the simulator engine in the background so entering is instant.
  startEngineBoot().catch(() => {});
}
bootstrap();
</script>
</body>
</html>
